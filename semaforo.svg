<svg width="100%" viewBox="0 0 680 255" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Semáforo Inteligente — Selva Tabasqueña</title>

  <defs>
    <marker id="ar3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <clipPath id="roadC"><rect x="0" y="182" width="680" height="73"/></clipPath>
    <clipPath id="riverC"><rect x="0" y="210" width="680" height="25"/></clipPath>
    <style>
      @keyframes carMove1{0%{transform:translateX(500px)}100%{transform:translateX(-170px)}}
      @keyframes carMove2{0%{transform:translateX(620px)}100%{transform:translateX(-170px)}}
      @keyframes carMove3{0%{transform:translateX(360px)}100%{transform:translateX(-170px)}}
      @keyframes redBlink{0%,100%{fill:#c0392b;filter:drop-shadow(0 0 8px #c0392b)}50%{fill:#2a0808;filter:none}}
      @keyframes yellowBlink{0%,100%{fill:#e6ac00;filter:drop-shadow(0 0 8px #e6ac00)}50%{fill:#2a1c00;filter:none}}
      @keyframes greenBlink{0%,100%{fill:#27ae60;filter:drop-shadow(0 0 12px #27ae60)}50%{fill:#071a0c;filter:none}}
      @keyframes ping{0%{r:5;opacity:1}100%{r:18;opacity:0}}
      @keyframes sway1{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(6deg)}}
      @keyframes sway2{0%,100%{transform:rotate(4deg)}50%{transform:rotate(-6deg)}}
      @keyframes sway3{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(5deg)}}
      @keyframes riverFlow{0%{transform:translateX(0)}100%{transform:translateX(-40px)}}
      @keyframes chipFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
      @keyframes dash{to{stroke-dashoffset:-14}}
      @keyframes scanbox{0%,100%{opacity:1}50%{opacity:0.3}}
      @keyframes mist{0%,100%{opacity:0.06}50%{opacity:0.13}}
      .car1{animation:carMove1 5.5s linear infinite}
      .car2{animation:carMove2 8.5s linear infinite 2s}
      .car3{animation:carMove3 7s linear infinite 4.2s}
      .rl{animation:redBlink 1.4s ease-in-out infinite}
      .yl{animation:yellowBlink 1.4s ease-in-out infinite 0.47s}
      .gl{animation:greenBlink 1.4s ease-in-out infinite 0.94s}
      .ping{animation:ping 2s ease-out infinite}
      .dline{stroke-dasharray:4 4;animation:dash 0.6s linear infinite}
      .sb{animation:scanbox 1.3s ease-in-out infinite}
      .cf1{animation:chipFloat 2.8s ease-in-out infinite}
      .cf2{animation:chipFloat 2.8s ease-in-out infinite 0.7s}
      .cf3{animation:chipFloat 2.8s ease-in-out infinite 1.4s}
      .cf4{animation:chipFloat 2.8s ease-in-out infinite 2s}
      .mist{animation:mist 4s ease-in-out infinite}
      .sw1{transform-origin:center bottom;animation:sway1 3.2s ease-in-out infinite}
      .sw2{transform-origin:center bottom;animation:sway2 2.7s ease-in-out infinite}
      .sw3{transform-origin:center bottom;animation:sway3 3.8s ease-in-out infinite}
      .sw4{transform-origin:center bottom;animation:sway1 2.4s ease-in-out infinite 0.5s}
      .sw5{transform-origin:center bottom;animation:sway2 3.5s ease-in-out infinite 1s}
      .river{animation:riverFlow 3s linear infinite}
    </style>
  </defs>

